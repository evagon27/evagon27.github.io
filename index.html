<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STARFORCE OMEGA</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Press Start 2P', monospace; overflow: hidden; }
  #gameWrapper { position: relative; width: 480px; height: 640px; }
  canvas { display: block; image-rendering: pixelated; image-rendering: crisp-edges; }
  #ui { position: absolute; top: 0; left: 0; right: 0; padding: 8px 12px; display: flex; justify-content: space-between; pointer-events: none; z-index: 10; }
  .stat-block { font-size: 7px; line-height: 1.8; text-shadow: 0 0 8px currentColor; }
  .stat-block.left { color: #00ffcc; }
  .stat-block.right { color: #ff6644; text-align: right; }
  #abilityBar { position: absolute; bottom: 8px; left: 0; right: 0; display: flex; justify-content: center; gap: 10px; pointer-events: none; z-index: 10; }
  .ab-slot { display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .ab-icon { width: 36px; height: 36px; border: 2px solid #555; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; font-size: 16px; position: relative; overflow: hidden; }
  .ab-cd { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.75); }
  .ab-key { font-size: 6px; color: #aaa; }
  #overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.88); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 20; gap: 14px; }
  #overlay h1 { font-size: 20px; color: #00ffcc; text-shadow: 0 0 20px #00ffcc, 0 0 40px #00ffcc; text-align: center; line-height: 1.5; }
  #overlay h2 { font-size: 9px; color: #ff6644; margin-top: -8px; }
  .ship-select { display: flex; gap: 10px; }
  .ship-card { width: 110px; border: 2px solid #333; padding: 8px 6px; cursor: pointer; transition: border-color 0.15s, background 0.15s; text-align: center; background: rgba(255,255,255,0.03); }
  .ship-card:hover, .ship-card.selected { border-color: #00ffcc; background: rgba(0,255,204,0.08); }
  .ship-preview { width: 64px; height: 64px; display: block; margin: 0 auto 6px; image-rendering: pixelated; object-fit: contain; }
  .ship-name { font-size: 7px; color: #00ffcc; margin-bottom: 4px; }
  .ship-desc { font-size: 5px; color: #888; line-height: 1.6; }
  .ship-ab { font-size: 5px; color: #aaffaa; margin-top: 4px; line-height: 1.8; text-align: left; }
  .btn { font-family: 'Press Start 2P', monospace; font-size: 9px; padding: 10px 20px; background: transparent; border: 2px solid #00ffcc; color: #00ffcc; cursor: pointer; text-shadow: 0 0 8px #00ffcc; box-shadow: 0 0 12px rgba(0,255,204,0.3); transition: all 0.15s; }
  .btn:hover { background: rgba(0,255,204,0.15); box-shadow: 0 0 24px rgba(0,255,204,0.6); }
  .btn.dim { border-color: #666; color: #666; text-shadow: none; box-shadow: none; }
  .controls-hint { font-size: 5.5px; color: #555; text-align: center; line-height: 2; }
  #bossWarning { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 13px; color: #ff4444; text-shadow: 0 0 20px #ff4444; pointer-events: none; z-index: 15; opacity: 0; transition: opacity 0.3s; white-space: nowrap; }
</style>
</head>

</div>

// ── GAME CLASS ────────────────────────────────────────────────────────
class Game {
  constructor(shipDef, themeIdx) {
    this.shipDef = shipDef;
    this.theme = BG_THEMES[themeIdx];
    this.themeIdx = themeIdx;
    // Parallax scroll offsets for tiled layers
    this.bgOffsets = this.theme.layers.map(() => 0);
    this.score=0; this.wave=1; this.waveSpawnAccum=0;
    this.running=false; this.gameOver=false;
    this.player={
      x:240, y:520, hp:shipDef.hp, maxHp:shipDef.hp,
      shield:0, maxShield:30,
      invincible:false, invincibleTimer:0,
      boosting:false, boostTimer:0,
      cloaked:false, cloakTimer:0,
      fireAccum:0, flashTimer:0
    };
    this.keys={};
    this.bullets=[]; this.enemies=[]; this.particles=[]; this.powerups=[];
    this.abilities=shipDef.abilities.map(a=>Object.assign({},a,{cdLeft:0}));
    this.killCount=0; this.bossActive=false; this.nextBossWave=5;
    this.multiplier=1; this.multiplierTimer=0;
    this.camShake=0; this.nukeFlash=0; this.elapsed=0;
  }

  bindInput() {
    this._kd = e=>{
      this.keys[e.code]=true;
      if(e.code==='KeyQ') this.tryAbility(0);
      if(e.code==='KeyE') this.tryAbility(1);
      if(e.code==='KeyR') this.tryAbility(2);
      if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
    };
    this._ku = e=>{ this.keys[e.code]=false; };
    window.addEventListener('keydown', this._kd);
    window.addEventListener('keyup', this._ku);
  }
  unbindInput() {
    window.removeEventListener('keydown', this._kd);
    window.removeEventListener('keyup', this._ku);
  }

  tryAbility(i) {
    if(!this.running||this.gameOver) return;
    const ab=this.abilities[i];
    if(ab.cdLeft<=0){ ab.cdLeft=ab.cd; this.shipDef.useAbility(this,i); }
  }

  update(dt) {
    if(!this.running||this.gameOver) return;
    this.elapsed+=dt;
    this.camShake=Math.max(0,this.camShake-dt*8);
    this.nukeFlash=Math.max(0,this.nukeFlash-dt*3);
    // Scroll parallax layers
    for(let i=0;i<this.bgOffsets.length;i++) {
      const layer = this.theme.layers[i];
      if(!layer.pin) this.bgOffsets[i]=(this.bgOffsets[i]+layer.speed*dt);
    }
    this.updatePlayer(dt); this.updateBullets(dt);
    this.updateEnemies(dt); this.updateParticles(dt);
    this.updatePowerups(dt); this.updateAbilities(dt);
    this.updateWave(dt); this.updateMultiplier(dt);
    this.updateUI();
  }

  updatePlayer(dt) {
    const p=this.player, spd=this.shipDef.speed*(p.boosting?2.2:1);
    if(p.boosting){ p.boostTimer-=dt; if(p.boostTimer<=0) p.boosting=false; }
    if(p.cloaked){ p.cloakTimer-=dt; if(p.cloakTimer<=0){p.cloaked=false;p.invincible=false;} }
    if(p.invincible){ p.invincibleTimer-=dt; if(p.invincibleTimer<=0) p.invincible=false; }
    if(p.flashTimer>0) p.flashTimer-=dt;
    if(this.keys['ArrowLeft']||this.keys['KeyA']) p.x-=spd*dt;
    if(this.keys['ArrowRight']||this.keys['KeyD']) p.x+=spd*dt;
    if(this.keys['ArrowUp']||this.keys['KeyW']) p.y-=spd*dt;
    if(this.keys['ArrowDown']||this.keys['KeyS']) p.y+=spd*dt;
    p.x=Math.max(20,Math.min(460,p.x));
    p.y=Math.max(50,Math.min(610,p.y));
    p.fireAccum+=dt;
    if((this.keys['Space']||this.keys['KeyZ'])&&p.fireAccum>=this.shipDef.fireRate){
      p.fireAccum=0; this.playerShoot();
    }
    if(p.shield<p.maxShield) p.shield=Math.min(p.maxShield,p.shield+5*dt);
  }

  playerShoot(rapid=false) {
    const p=this.player,d=this.shipDef;
    this.bullets.push({x:p.x,y:p.y-20,dx:0,dy:-d.bulletSpeed,
      damage:d.bulletDamage*(rapid?0.7:1),size:rapid?3:4,color:d.bulletColor,owner:'player'});
  }

  updateBullets(dt) {
    for(let i=this.bullets.length-1;i>=0;i--) {
      const b=this.bullets[i];
      if(b.homing&&b.owner==='player') {
        const t=this.findNearest(b.x,b.y);
        if(t) {
          const tx=t.x-b.x,ty=t.y-b.y,d=Math.sqrt(tx*tx+ty*ty)||1;
          b.dx+=(tx/d)*300*dt; b.dy+=(ty/d)*300*dt;
          const sp=Math.sqrt(b.dx*b.dx+b.dy*b.dy);
          if(sp>520){b.dx=b.dx/sp*520;b.dy=b.dy/sp*520;}
        }
      }
      b.x+=b.dx*dt; b.y+=b.dy*dt;
      if(b.x<-20||b.x>500||b.y<-20||b.y>660){this.bullets.splice(i,1);continue;}
      if(b.owner==='player') {
        for(let j=this.enemies.length-1;j>=0;j--) {
          const e=this.enemies[j]; if(e.dead) continue;
          const dx=b.x-e.x,dy=b.y-e.y;
          const hit=b.nova?(dx*dx+dy*dy<(e.size+b.size)*(e.size+b.size)*2.5):(Math.abs(dx)<e.size+b.size&&Math.abs(dy)<e.size+b.size);
          if(hit){
            e.hp-=b.damage; this.spawnHit(e.x,e.y,this.shipDef.bulletColor);
            if(!b.nova){this.bullets.splice(i,1);break;}
            if(e.hp<=0) this.killEnemy(j,e);
          }
        }
      } else {
        if(!this.player.invincible){
          const dx=b.x-this.player.x,dy=b.y-this.player.y;
          if(Math.abs(dx)<14&&Math.abs(dy)<16){this.damagePlayer(b.damage||15);this.bullets.splice(i,1);}
        }
      }
    }
    for(let j=this.enemies.length-1;j>=0;j--){
      if(this.enemies[j].hp<=0&&!this.enemies[j].dead) this.killEnemy(j,this.enemies[j]);
    }
  }

  findNearest(x,y){let best=null,bd=99999;for(const e of this.enemies){const d=(e.x-x)**2+(e.y-y)**2;if(d<bd){bd=d;best=e;}}return best;}

  killEnemy(idx,e){
    if(e.dead) return; e.dead=true;
    const pts=Math.floor((e.boss?500:(e.type==='asteroid'?20:50))*this.multiplier);
    this.score+=pts; this.killCount++;
    this.multiplierTimer=3; this.multiplier=Math.min(8,this.multiplier+0.5);
    this.spawnExplosion(e.x,e.y,e.boss?80:e.size*2,e.color);
    this.camShake=e.boss?0.8:0.2;
    if(Math.random()<0.15) this.spawnPowerup(e.x,e.y);
    this.enemies.splice(idx,1);
    if(e.boss){this.bossActive=false;this.wave++;this.spawnWave();}
  }

  updateEnemies(dt){
    for(let i=this.enemies.length-1;i>=0;i--){
      const e=this.enemies[i];
      e.x+=e.dx*dt; e.y+=e.dy*dt;
      e.angle=(e.angle||0)+(e.rotSpeed||0)*dt;
      e.fireAccum=(e.fireAccum||0)+dt;
      if(e.behavior==='zigzag'){e.zigT=(e.zigT||0)+dt;e.dx=Math.sin(e.zigT*3)*120;}
      else if(e.behavior==='homing'){
        const tx=this.player.x-e.x,ty=this.player.y-e.y,d=Math.sqrt(tx*tx+ty*ty)||1;
        e.dx+=(tx/d)*60*dt;e.dy+=(ty/d)*60*dt;
        const sp=Math.sqrt(e.dx*e.dx+e.dy*e.dy),ms=e.maxSpeed||100;
        if(sp>ms){e.dx=e.dx/sp*ms;e.dy=e.dy/sp*ms;}
      } else if(e.behavior==='boss'){
        e.bossT=(e.bossT||0)+dt;
        e.dx=Math.sin(e.bossT*0.8)*140;
        e.dy=Math.sin(e.bossT*0.3)*30;
        e.y=Math.max(80,Math.min(280,e.y));
      }
      if(e.shootRate&&e.fireAccum>=e.shootRate&&e.y<600){e.fireAccum=0;this.enemyShoot(e);}
      if(e.y>680||e.y<-100||e.x<-100||e.x>580){if(!e.boss)this.enemies.splice(i,1);continue;}
      if(!this.player.invincible){
        const dx=e.x-this.player.x,dy=e.y-this.player.y;
        if(Math.abs(dx)<e.size+14&&Math.abs(dy)<e.size+14){
          this.damagePlayer(e.boss?40:e.ramDmg||25);
          if(!e.boss) this.killEnemy(i,e);
        }
      }
    }
  }

  enemyShoot(e){
    const dx=this.player.x-e.x,dy=this.player.y-e.y,d=Math.sqrt(dx*dx+dy*dy)||1,sp=260;
    if(e.boss){for(let a=-1;a<=1;a++){const ang=Math.atan2(dy,dx)+a*0.3;this.bullets.push({x:e.x,y:e.y,dx:Math.cos(ang)*sp,dy:Math.sin(ang)*sp,damage:20,size:5,color:'#ff3333',owner:'enemy'});}}
    else this.bullets.push({x:e.x,y:e.y,dx:dx/d*sp,dy:dy/d*sp,damage:15,size:4,color:'#ff4400',owner:'enemy'});
  }

  damagePlayer(dmg){
    const p=this.player;
    if(p.shield>0){const ab=Math.min(p.shield,dmg);p.shield-=ab;dmg-=ab;}
    p.hp-=dmg; p.flashTimer=0.4; this.camShake=0.4;
    this.spawnExplosion(p.x,p.y,30,'#ff4400');
    if(p.hp<=0){this.spawnExplosion(p.x,p.y,80,'#ff8800');this.triggerGameOver();}
  }

  updateWave(dt){
    if(this.bossActive) return;
    this.waveSpawnAccum+=dt;
    const interval=Math.max(0.4,2.0-this.wave*0.1);
    if(this.waveSpawnAccum>=interval){this.waveSpawnAccum=0;this.spawnEnemy();}
    if(this.wave>=this.nextBossWave&&this.enemies.length===0) this.triggerBoss();
  }

  start(){this.running=true;this.spawnWave();}

  spawnWave(){
    const n=3+this.wave;
    for(let i=0;i<n;i++) setTimeout(()=>this.spawnEnemy(),i*400);
  }

  spawnEnemy(){
    const w=this.wave,r=Math.random();
    let e;
    if(r<0.3){const s=12+Math.random()*18;e={x:Math.random()*440+20,y:-s,dx:(Math.random()-0.5)*80,dy:40+Math.random()*80+w*5,hp:s*3,maxHp:s*3,size:s,type:'asteroid',color:'#997755',behavior:'drift',rotSpeed:(Math.random()-0.5)*3,ramDmg:20};}
    else if(r<0.5){e={x:Math.random()*440+20,y:-20,dx:(Math.random()-0.5)*100,dy:120+Math.random()*60+w*8,hp:40+w*5,maxHp:40+w*5,size:8,type:'meteor',color:'#cc4400',behavior:'drift',rotSpeed:(Math.random()-0.5)*5,ramDmg:25};}
    else if(r<0.68){e={x:Math.random()*440+20,y:-20,dx:(Math.random()-0.5)*60,dy:60+Math.random()*40,hp:30+w*8,maxHp:30+w*8,size:12,type:'fighter',color:'#ff4422',behavior:'zigzag',shootRate:2.5-w*0.08,ramDmg:20};}
    else if(r<0.82){e={x:Math.random()*440+20,y:-20,dx:0,dy:40,hp:20+w*5,maxHp:20+w*5,size:9,type:'drone',color:'#ff8800',behavior:'homing',maxSpeed:80+w*5,shootRate:3,ramDmg:30};}
    else{e={x:Math.random()*440+20,y:-20,dx:(Math.random()-0.5)*40,dy:30+w*3,hp:80+w*15,maxHp:80+w*15,size:18,type:'cruiser',color:'#8844ff',behavior:'zigzag',shootRate:1.8,ramDmg:35};}
    this.enemies.push(e);
  }

  triggerBoss(){
    this.bossActive=true; this.nextBossWave+=5;
    const bw=document.getElementById('bossWarning');
    bw.style.opacity='1';
    setTimeout(()=>{
      bw.style.opacity='0';
      const hp=400+this.wave*50;
      this.enemies.push({x:240,y:-60,dx:0,dy:30,hp,maxHp:hp,size:40,type:'boss',color:'#ff2200',behavior:'boss',shootRate:0.8,boss:true,ramDmg:50});
    },2000);
  }

  triggerNuke(){
    this.nukeFlash=1; this.camShake=1;
    for(let i=this.enemies.length-1;i>=0;i--){
      const e=this.enemies[i];
      if(!e.boss){this.spawnExplosion(e.x,e.y,e.size*2,e.color);this.score+=Math.floor(30*this.multiplier);this.enemies.splice(i,1);}
      else{e.hp-=150;if(e.hp<=0)this.killEnemy(i,e);}
    }
    this.bullets=this.bullets.filter(b=>b.owner==='player');
  }

  spawnWarpEffect(x,y){for(let i=0;i<20;i++){const a=Math.random()*Math.PI*2,sp=Math.random()*200+50;this.particles.push({x,y,dx:Math.cos(a)*sp,dy:Math.sin(a)*sp,life:0.4,maxLife:0.4,size:3,color:'#aa44ff'});}}
  spawnHit(x,y,c){for(let i=0;i<3;i++){const a=Math.random()*Math.PI*2;this.particles.push({x,y,dx:Math.cos(a)*80,dy:Math.sin(a)*80,life:0.25,maxLife:0.25,size:2,color:c});}}
  spawnExplosion(x,y,r,c){
    const n=Math.floor(r*1.5);
    for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,sp=Math.random()*r*3+20;this.particles.push({x,y,dx:Math.cos(a)*sp,dy:Math.sin(a)*sp,life:0.4+Math.random()*0.4,maxLife:0.8,size:Math.random()*4+1,color:c,fade:true});}
    this.particles.push({x,y,dx:0,dy:0,life:0.15,maxLife:0.15,size:r,color:'#fff',flash:true});
  }
  spawnPowerup(x,y){const t=['hp','shield','multi'][Math.floor(Math.random()*3)];this.powerups.push({x,y,dy:60,type:t,life:8});}

  updatePowerups(dt){
    for(let i=this.powerups.length-1;i>=0;i--){
      const pw=this.powerups[i]; pw.y+=pw.dy*dt; pw.life-=dt;
      if(pw.y>660||pw.life<=0){this.powerups.splice(i,1);continue;}
      const dx=pw.x-this.player.x,dy=pw.y-this.player.y;
      if(Math.abs(dx)<20&&Math.abs(dy)<20){
        if(pw.type==='hp') this.player.hp=Math.min(this.player.maxHp,this.player.hp+30);
        else if(pw.type==='shield') this.player.shield=this.player.maxShield;
        else{this.multiplier=Math.min(8,this.multiplier+1);this.multiplierTimer=5;}
        this.powerups.splice(i,1);
      }
    }
  }
  updateParticles(dt){for(let i=this.particles.length-1;i>=0;i--){const p=this.particles[i];p.x+=p.dx*dt;p.y+=p.dy*dt;p.dx*=0.92;p.dy*=0.92;p.life-=dt;if(p.life<=0)this.particles.splice(i,1);}}
  updateAbilities(dt){for(const ab of this.abilities) if(ab.cdLeft>0) ab.cdLeft=Math.max(0,ab.cdLeft-dt);}
  updateMultiplier(dt){if(this.multiplierTimer>0){this.multiplierTimer-=dt;if(this.multiplierTimer<=0)this.multiplier=1;}}
  triggerGameOver(){this.running=false;this.gameOver=true;setTimeout(()=>showGameOver(this),1500);}

  updateUI(){
    const p=this.player;
    document.getElementById('leftStats').innerHTML=`SCORE<br><span style="font-size:9px">${this.score.toString().padStart(7,'0')}</span><br>WAVE ${this.wave}<br>x${this.multiplier.toFixed(1)} MULTI`;
    document.getElementById('rightStats').innerHTML=`HP ${Math.max(0,Math.ceil(p.hp))}/${p.maxHp}<br>SH ${Math.ceil(p.shield)}/${p.maxShield}<br>KILLS ${this.killCount}`;
    for(let i=0;i<3;i++){
      const ab=this.abilities[i];
      document.getElementById(`ab${i+1}cd`).style.height=(ab.cdLeft/ab.cd*100)+'%';
      document.getElementById(`ab${i+1}icon`).textContent=ab.icon;
    }
  }

  // ── DRAW ────────────────────────────────────────────────────
  draw(){
    const shk=this.camShake>0?{x:(Math.random()-0.5)*this.camShake*12,y:(Math.random()-0.5)*this.camShake*12}:{x:0,y:0};
    ctx.save(); ctx.translate(shk.x,shk.y);

    // Background fill
    ctx.fillStyle=this.theme.fillColor;
    ctx.fillRect(-10,-10,500,660);

    // Draw parallax layers
    this.drawBackground();

    // Particles
    for(const p of this.particles){
      ctx.globalAlpha=p.fade?(p.life/p.maxLife):1;
      if(p.flash){
        const g2=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.size);
        g2.addColorStop(0,'rgba(255,255,255,0.9)');g2.addColorStop(1,'rgba(255,255,255,0)');
        ctx.fillStyle=g2; ctx.fillRect(p.x-p.size,p.y-p.size,p.size*2,p.size*2);
      } else {ctx.fillStyle=p.color;ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);}
      ctx.globalAlpha=1;
    }

    // Powerups
    for(const pw of this.powerups){
      ctx.save();ctx.globalAlpha=0.7+Math.sin(this.elapsed*5)*0.2;
      ctx.font='20px serif';ctx.textAlign='center';
      ctx.fillText(pw.type==='hp'?'❤':pw.type==='shield'?'🛡':'✨',pw.x,pw.y);
      ctx.restore();
    }

    // Enemies
    for(const e of this.enemies) this.drawEnemy(e);

    // Bullets
    for(const b of this.bullets){
      ctx.save();ctx.shadowBlur=8;ctx.shadowColor=b.color;ctx.fillStyle=b.color;
      if(b.nova){ctx.beginPath();ctx.arc(b.x,b.y,b.size,0,Math.PI*2);ctx.fill();}
      else ctx.fillRect(b.x-b.size/2,b.y-b.size,b.size,b.size*2.5);
      ctx.restore();
    }

    // Player
    const p=this.player;
    if(!p.cloaked||Math.sin(this.elapsed*12)>0){
      ctx.save();
      if(p.invincible&&!p.cloaked) ctx.globalAlpha=0.6+Math.sin(this.elapsed*10)*0.4;
      if(p.flashTimer>0) ctx.globalAlpha=0.4;
      if(p.cloaked) ctx.globalAlpha=0.25;
      ctx.imageSmoothingEnabled=false;
      const img=IMGS[this.shipDef.imgKey];
      const sw=img.naturalWidth||16, sh=img.naturalHeight||16;
      const scale=this.shipDef.id==='titan'?0.55:3.5;
      const dw=sw*scale, dh=sh*scale;
      ctx.drawImage(img,p.x-dw/2,p.y-dh/2,dw,dh);
      // Engine flame
      if(p.boosting||(this.keys&&(this.keys['ArrowUp']||this.keys['KeyW']))){
        ctx.shadowBlur=15;ctx.shadowColor='#ff8800';
        ctx.fillStyle=`rgba(255,${100+Math.random()*80|0},0,0.85)`;
        ctx.fillRect(p.x-4,p.y+dh/2-4,3,8+Math.random()*8);
        ctx.fillRect(p.x+1,p.y+dh/2-4,3,8+Math.random()*8);
      }
      ctx.restore();
    }

    // HP / shield bar
    const bw=180;
    ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(148,618,184,14);
    ctx.fillStyle='#ff4444';ctx.fillRect(150,620,bw*(p.hp/p.maxHp),10);
    ctx.fillStyle='#4488ff';ctx.fillRect(150,620,bw*(p.shield/p.maxShield)*0.3,10);
    ctx.strokeStyle='#444';ctx.strokeRect(150,620,bw,10);

    // Nuke flash
    if(this.nukeFlash>0){ctx.fillStyle=`rgba(255,200,0,${this.nukeFlash*0.5})`;ctx.fillRect(-10,-10,500,660);}

    ctx.restore();
  }

  drawBackground(){
    const theme=this.theme;
    ctx.imageSmoothingEnabled=false;
    for(let li=0;li<theme.layers.length;li++){
      const layer=theme.layers[li];
      const img=IMGS[layer.key];
      if(!img||!img.complete) continue;
      ctx.globalAlpha=layer.alpha||1;
      if(layer.pin){
        // Pinned prop (planet, asteroid) — draw once at fixed position, slow drift
        const sc=layer.scale||1;
        const dw=img.naturalWidth*sc, dh=img.naturalHeight*sc;
        const drift=this.bgOffsets[li]%(dh+640);
        ctx.drawImage(img, layer.pin.x-dw/2, layer.pin.y-dh/2+drift*0.02, dw, dh);
      } else {
        // Tiled scrolling layer
        const iw=img.naturalWidth, ih=img.naturalHeight;
        if(iw===0||ih===0){ctx.globalAlpha=1;continue;}
        // Scale to fit canvas width (480px), maintain aspect
        const scale=480/iw;
        const dw=480, dh=ih*scale;
        const offset=this.bgOffsets[li]%dh;
        // Draw enough tiles to fill screen
        let y=-offset;
        while(y<640){
          ctx.drawImage(img, 0, 0, iw, ih, 0, y, dw, dh);
          y+=dh;
        }
      }
      ctx.globalAlpha=1;
    }
  }

  drawEnemy(e){
    ctx.save();
    // HP bar
    if(!e.boss){
      const bw=e.size*2;
      ctx.fillStyle='#222';ctx.fillRect(e.x-bw/2,e.y-e.size-6,bw,3);
      ctx.fillStyle=e.hp/e.maxHp>0.5?'#44ff44':'#ff4444';
      ctx.fillRect(e.x-bw/2,e.y-e.size-6,bw*(e.hp/e.maxHp),3);
    } else {
      ctx.fillStyle='#222';ctx.fillRect(40,28,400,10);
      ctx.fillStyle='#ff2200';ctx.fillRect(40,28,400*(e.hp/e.maxHp),10);
      ctx.strokeStyle='#ff4400';ctx.strokeRect(40,28,400,10);
      ctx.fillStyle='#fff';ctx.font='7px "Press Start 2P"';ctx.textAlign='center';
      ctx.fillText('BOSS',240,37);
    }
    ctx.translate(e.x,e.y);ctx.rotate(e.angle||0);
    ctx.shadowBlur=6;ctx.shadowColor=e.color;
    ctx.imageSmoothingEnabled=false;
    const s=e.size;
    switch(e.type){
      case 'fighter':{
        try{
          const sc=s*2;
          ctx.drawImage(IMGS.IMG_SPACESHIPS,128,0,128,64,-sc/2,-sc/2,sc,sc);
          ctx.globalAlpha=0.45;ctx.fillStyle='#ff2200';ctx.fillRect(-sc/2,-sc/2,sc,sc);ctx.globalAlpha=1;
        }catch(_){ctx.fillStyle=e.color;ctx.beginPath();ctx.moveTo(0,s);ctx.lineTo(-s,-s*0.5);ctx.lineTo(s,-s*0.5);ctx.closePath();ctx.fill();}
        break;
      }
      case 'drone':{
        ctx.fillStyle=e.color;ctx.beginPath();ctx.arc(0,0,s,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#ffcc00';ctx.beginPath();ctx.arc(0,0,s*0.5,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#ff2200';ctx.fillRect(-1,-s,2,s*0.6);
        break;
      }
      case 'asteroid':{
        ctx.fillStyle='#886644';ctx.beginPath();
        for(let i=0;i<8;i++){const a=i/8*Math.PI*2,r=s*(0.7+Math.sin(i*2.3+e.x)*0.3);i===0?ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r):ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);}
        ctx.closePath();ctx.fill();
        ctx.fillStyle='#554422';ctx.fillRect(-s*0.3,-s*0.2,s*0.25,s*0.25);
        break;
      }
      case 'meteor':{
        ctx.fillStyle='#cc4400';ctx.beginPath();
        for(let i=0;i<6;i++){const a=i/6*Math.PI*2,r=s*(0.8+Math.sin(i*1.7)*0.2);i===0?ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r):ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);}
        ctx.closePath();ctx.fill();
        ctx.fillStyle='#ff6600';ctx.beginPath();ctx.arc(s*0.2,-s*0.2,s*0.3,0,Math.PI*2);ctx.fill();
        break;
      }
      case 'cruiser':{
        try{
          const sc=s*2.2;
          ctx.drawImage(IMGS.IMG_SPACESHIPS,384,0,128,64,-sc/2,-sc/2,sc,sc);
          ctx.globalAlpha=0.4;ctx.fillStyle='#ff4400';ctx.fillRect(-sc/2,-sc/2,sc,sc);ctx.globalAlpha=1;
        }catch(_){ctx.fillStyle=e.color;ctx.fillRect(-s,-s*0.5,s*2,s);}
        break;
      }
      case 'boss':{
        try{
          ctx.drawImage(IMGS.IMG_GRAY3,-s,-s,s*2,s*2);
          ctx.globalAlpha=0.55;ctx.fillStyle='#ff0000';ctx.fillRect(-s,-s,s*2,s*2);ctx.globalAlpha=1;
          ctx.globalAlpha=0.2+Math.sin(this.elapsed*4)*0.1;
          ctx.shadowBlur=40;ctx.shadowColor='#ff2200';
          ctx.beginPath();ctx.arc(0,0,s*1.2,0,Math.PI*2);
          ctx.strokeStyle='#ff2200';ctx.lineWidth=3;ctx.stroke();
          ctx.globalAlpha=1;
        }catch(_){ctx.fillStyle='#cc0000';ctx.fillRect(-s,-s,s*2,s*2);}
        break;
      }
    }
    ctx.restore();
  }
}

// ── UI ───────────────────────────────────────────────────────────────
let selectedShip = 0;

function buildShipSelect(){
  const c=document.getElementById('shipSelect');
  c.innerHTML='';
  SHIPS.forEach((ship,idx)=>{
    const card=document.createElement('div');
    card.className='ship-card'+(idx===selectedShip?' selected':'');
    const img=document.createElement('img');
    img.className='ship-preview'; img.src=IMGS[ship.imgKey].src;
    card.appendChild(img);
    const nm=document.createElement('div');nm.className='ship-name';nm.textContent=ship.name;card.appendChild(nm);
    const dc=document.createElement('div');dc.className='ship-desc';dc.textContent=ship.desc;card.appendChild(dc);
    const ab=document.createElement('div');ab.className='ship-ab';
    ab.innerHTML=ship.abilities.map(a=>`${a.icon} ${a.desc}`).join('<br>');card.appendChild(ab);
    card.addEventListener('click',()=>{selectedShip=idx;document.querySelectorAll('.ship-card').forEach((c,i)=>c.className='ship-card'+(i===idx?' selected':''));});
    c.appendChild(card);
  });
}

function showGameOver(game){
  game.unbindInput();
  const themeLabel=game.theme.name;
  const ov=document.getElementById('overlay');
  ov.innerHTML=`
    <h1 style="color:#ff4444;text-shadow:0 0 20px #ff4444">GAME<br>OVER</h1>
    <div style="font-size:6px;color:#666;margin-top:-6px">${themeLabel}</div>
    <div style="font-size:7px;color:#aaa;line-height:2.4;text-align:center">
      SCORE<br><span style="font-size:14px;color:#00ffcc">${game.score.toString().padStart(7,'0')}</span><br>
      WAVE <span style="color:#00ffcc">${game.wave}</span> &nbsp;|&nbsp;
      KILLS <span style="color:#00ffcc">${game.killCount}</span><br>
      TIME <span style="color:#00ffcc">${Math.floor(game.elapsed)}s</span>
    </div>
    <button class="btn" id="retryBtn">RETRY</button>
    <button class="btn dim" id="menuBtn">MENU</button>`;
  ov.style.display='flex';
  document.getElementById('retryBtn').addEventListener('click',()=>startGame(SHIPS[selectedShip]));
  document.getElementById('menuBtn').addEventListener('click',()=>showMenu());
}

function showMenu(){
  const ov=document.getElementById('overlay');
  ov.innerHTML=`
    <h1>STARFORCE<br>OMEGA</h1>
    <h2>ENDLESS SURVIVAL</h2>
    <div class="ship-select" id="shipSelect"></div>
    <button class="btn" id="startBtn">LAUNCH</button>
    <div class="controls-hint">WASD / ARROWS — MOVE &nbsp;|&nbsp; SPACE — FIRE<br>Q / E / R — ABILITIES</div>`;
  ov.style.display='flex';
  buildShipSelect();
  document.getElementById('startBtn').addEventListener('click',()=>startGame(SHIPS[selectedShip]));
}

let currentGame=null, animFrame=null, lastTime=0;

function startGame(shipDef){
  document.getElementById('overlay').style.display='none';
  if(animFrame) cancelAnimationFrame(animFrame);
  if(currentGame) currentGame.unbindInput();
  // Pick a random background theme each run
  const themeIdx = Math.floor(Math.random()*BG_THEMES.length);
  currentGame=new Game(shipDef, themeIdx);
  currentGame.bindInput();
  currentGame.start();
  lastTime=performance.now();
  function loop(ts){
    const dt=Math.min((ts-lastTime)/1000,0.05);
    lastTime=ts;
    currentGame.update(dt);
    currentGame.draw();
    if(!currentGame.gameOver) animFrame=requestAnimationFrame(loop);
  }
  animFrame=requestAnimationFrame(loop);
}

// Wait for images then show menu
whenLoaded(()=>showMenu());
</script>
</body>
</html>
